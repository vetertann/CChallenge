# Small Track 2 container smoke scenario.
# Uses the local GHCR tag before digest pinning; final submission uses digest.

[evaluator]
image = "ghcr.io/car-bench/car-bench-evaluator:latest"

[evaluator.env]
GEMINI_API_KEY = "${GEMINI_API_KEY:?Set GEMINI_API_KEY}"
LOGURU_LEVEL = "${LOGURU_LEVEL:-INFO}"

[agent_under_test]
image = "ghcr.io/vetertann/car-coroutine-agent:v1"

[agent_under_test.env]
CEREBRAS_API_KEY = "${CEREBRAS_API_KEY:?Set CEREBRAS_API_KEY}"
CAR_AGENT_MODEL_PROVIDER = "${CAR_AGENT_MODEL_PROVIDER:-cerebras}"
CAR_AGENT_MODEL = "${CAR_AGENT_MODEL:-gpt-oss-120b}"
CAR_AGENT_SKILL = "${CAR_AGENT_SKILL:-car_domain_120b.md}"
CAR_AGENT_TOOL_MODE = "${CAR_AGENT_TOOL_MODE:-prompt_json}"
CAR_AGENT_TEMPERATURE = "${CAR_AGENT_TEMPERATURE:-0}"
CAR_AGENT_REASONING_EFFORT = "${CAR_AGENT_REASONING_EFFORT:-}"
CAR_AGENT_MAX_OUTPUT_TOKENS = "${CAR_AGENT_MAX_OUTPUT_TOKENS:-2048}"
CAR_AGENT_MAX_INTERNAL_STEPS = "${CAR_AGENT_MAX_INTERNAL_STEPS:-5}"
CAR_AGENT_MAX_ATTEMPTS = "${CAR_AGENT_MAX_ATTEMPTS:-6}"
CAR_AGENT_STORM_RETRY_TEMPERATURES = "${CAR_AGENT_STORM_RETRY_TEMPERATURES:-0.15,0.4,0.8}"
LOGURU_LEVEL = "${LOGURU_LEVEL:-INFO}"

[config]
num_trials = 1
task_split = "test"
tasks_base_num_tasks = 2
tasks_hallucination_num_tasks = 2
tasks_disambiguation_num_tasks = 1
max_steps = 50

user_model = "gemini/gemini-2.5-flash"
user_provider = "gemini"
user_thinking = false

policy_evaluator_model = "gemini/gemini-2.5-flash"
policy_evaluator_provider = "gemini"
