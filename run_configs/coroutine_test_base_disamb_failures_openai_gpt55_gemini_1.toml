[evaluator]
endpoint = "http://127.0.0.1:18081"
cmd = "python src/evaluator/server.py --host 127.0.0.1 --port 18081"

[agent_under_test]
endpoint = "http://127.0.0.1:18080"
cmd = "python src/track_1_agent_coroutine_under_test/server.py --host 127.0.0.1 --port 18080 --model-provider openai --agent-llm gpt-5.5 --skill car_domain_120b.md"

[config]
num_trials = 1
task_split = "test"
tasks_base_num_tasks = 11
tasks_base_task_id_filter = [
  "base_9",
  "base_37",
  "base_45",
  "base_47",
  "base_49",
  "base_53",
  "base_59",
  "base_67",
  "base_81",
  "base_95",
  "base_97",
]
tasks_hallucination_num_tasks = 0
tasks_disambiguation_num_tasks = 6
tasks_disambiguation_task_id_filter = [
  "disambiguation_25",
  "disambiguation_29",
  "disambiguation_31",
  "disambiguation_45",
  "disambiguation_47",
  "disambiguation_49",
]
max_steps = 50

user_model = "gemini/gemini-2.5-flash"
user_provider = "gemini"
user_thinking = false

policy_evaluator_model = "gemini/gemini-2.5-flash"
policy_evaluator_provider = "gemini"
