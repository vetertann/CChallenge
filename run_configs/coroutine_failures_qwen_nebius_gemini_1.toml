[evaluator]
endpoint = "http://127.0.0.1:18081"
cmd = "python src/evaluator/server.py --host 127.0.0.1 --port 18081"

[agent_under_test]
endpoint = "http://127.0.0.1:18080"
cmd = "python src/track_1_agent_coroutine_under_test/server.py --host 127.0.0.1 --port 18080 --model-provider nebius --agent-llm Qwen/Qwen3.5-397B-A17B --skill car_domain_120b.md"

