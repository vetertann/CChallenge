# Local regression scenario focused on train tasks likely affected by
# capability-claim / completion-claim behavior.

[evaluator]
endpoint = "http://127.0.0.1:8081"
cmd = "python src/evaluator/server.py --host 127.0.0.1 --port 8081"

[agent_under_test]
endpoint = "http://127.0.0.1:8080"
cmd = "python src/track_1_agent_under_test/server.py --host 127.0.0.1 --port 8080"

[config]
num_trials = 3
task_split = "train"
tasks_hallucination_task_id_filter = [
  "hallucination_48",
  "hallucination_68",
  "hallucination_74",
  "hallucination_76",
  "hallucination_78",
  "hallucination_82",
  "hallucination_84",
  "hallucination_86",
  "hallucination_88",
  "hallucination_90",
  "hallucination_92",
  "hallucination_94",
]
tasks_base_task_id_filter = [
  "base_48",
  "base_68",
  "base_74",
  "base_98",
]
max_steps = 50

# Evaluator-side user simulator settings
user_model = "gpt-4.1-mini"
user_provider = "openai"
user_thinking = false

# Evaluator-side policy judge settings
policy_evaluator_model = "gpt-4.1-mini"
policy_evaluator_provider = "openai"
